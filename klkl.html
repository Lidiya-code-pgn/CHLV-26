<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Екзамен: Віртуальна геометрична майстерня з ML</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    
    <style>
      .ui-panel {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.95);
        padding: 20px;
        border-radius: 12px;
        font-family: 'Segoe UI', Arial, sans-serif;
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        width: 300px;
        border: 2px solid #008CBA;
      }
      .ui-panel h2 { margin: 0 0 5px 0; font-size: 18px; color: #111; text-align: center; }
      .student-info { font-size: 11px; color: #555; text-align: center; margin-bottom: 15px; }
      .control-group { margin-bottom: 12px; }
      .control-group label { display: block; font-size: 12px; font-weight: bold; color: #444; margin-bottom: 4px; }
      .btn {
        background: #008CBA; color: white; border: none; padding: 6px 10px;
        border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px;
      }
      .btn:hover { background: #007096; }
      .slider { width: 100%; }
      .stats {
        background: #eef7fa; padding: 10px; border-radius: 6px;
        font-size: 13px; margin-top: 15px; border-left: 4px solid #008CBA;
      }
      .voice-box {
        background: #fff3cd; padding: 10px; border-radius: 6px;
        font-size: 12px; margin-top: 12px; border: 1px solid #ffeeba; text-align: center;
      }
      .btn-mic { background: #dc3545; width: 100%; margin-top: 5px; padding: 8px; }
      .btn-mic:hover { background: #bd2130; }
    </style>
  </head>
  <body>

    <div class="ui-panel">
      <h2>Геометрична майстерня</h2>
      <div class="student-info">Екзаменаційний проєкт | Студентка групи МІМ-25</div>
      
      <div class="control-group">
        <label>Конструктор форми:</label>
        <button class="btn" onclick="setShape('cone')">Піраміда</button>
        <button class="btn" onclick="setShape('cylinder')">Призма</button>
      </div>

      <div class="control-group">
        <label>Радіус основи (R): <span id="lbl-radius">1.0</span> м</label>
        <input type="range" class="slider" id="sld-radius" min="0.3" max="2" step="0.1" value="1.0" oninput="updateFromUI()">
      </div>

      <div class="control-group">
        <label>Висота фігури (H): <span id="lbl-height">2.0</span> м</label>
        <input type="range" class="slider" id="sld-height" min="0.5" max="3.5" step="0.1" value="2.0" oninput="updateFromUI()">
      </div>

      <div class="control-group">
        <label>Кількість граней: <span id="lbl-segments">4</span></label>
        <input type="range" class="slider" id="sld-segments" min="3" max="12" step="1" value="4" oninput="updateFromUI()">
      </div>

      <div class="stats">
        <strong>Розрахунки калькулятора:</strong><br>
        Тип: <span id="calc-type" style="font-weight:bold;">Піраміда</span><br>
        Площа основи: <span id="calc-area">3.14</span> м²<br>
        <strong>Об'єм фігури (V): <span id="calc-volume">2.09</span> м³</strong>
      </div>

      <div class="voice-box">
        <strong>🤖 ML Голосове керування (UA)</strong>
        <div id="voice-status" style="color: #666; margin-top: 3px;">Мікрофон вимкнено</div>
        <button class="btn btn-mic" id="mic-btn" onclick="toggleVoice()">Увімкнути голос</button>
        <div style="font-size: 10px; color: #777; margin-top: 4px;">Команди: "піраміда", "призма", "більше", "вище"</div>
      </div>
    </div>

    <a-scene>
      <a-sky color="#DCE7E9"></a-sky>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="15" height="15" color="#9bc4cb"></a-plane>

      <a-entity id="geometry-object" 
                geometry="primitive: cone; radiusBottom: 1; height: 2; segmentsRadial: 4;" 
                position="0 1 -4" 
                material="color: #FF9F1C; wireframe: false; roughness: 0.3;"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
      </a-entity>

      <a-light type="ambient" color="#fff" intensity="0.8"></a-light>
      <a-light type="directional" position="2 4 1" intensity="0.6"></a-light>
      
      <a-entity position="0 1.6 0">
        <a-camera></a-camera>
      </a-entity>
    </a-scene>

    <script>
      let shapeType = 'cone';
      let radius = 1.0;
      let height = 2.0;
      let segments = 4;

      const objEl = document.getElementById('geometry-object');

      function setShape(type) {
        shapeType = type;
        if(type === 'cone') {
          document.getElementById('calc-type').innerText = "Піраміда";
        } else {
          document.getElementById('calc-type').innerText = "Призма";
        }
        updateGeometry();
      }

      function updateFromUI() {
        radius = parseFloat(document.getElementById('sld-radius').value);
        height = parseFloat(document.getElementById('sld-height').value);
        segments = parseInt(document.getElementById('sld-segments').value);
        
        document.getElementById('lbl-radius').innerText = radius.toFixed(1);
        document.getElementById('lbl-height').innerText = height.toFixed(1);
        document.getElementById('lbl-segments').innerText = segments;
        
        updateGeometry();
      }

      function updateGeometry() {
        let baseArea = 0;
        let volume = 0;

        // Математичний розрахунок площі правильного n-кутника або кола
        baseArea = Math.PI * Math.pow(radius, 2);

        if (shapeType === 'cone') {
          // Конструктор правильної піраміди
          objEl.setAttribute('geometry', `primitive: cone; radiusBottom: ${radius}; height: ${height}; segmentsRadial: ${segments};`);
          objEl.setAttribute('material', 'color: #FF9F1C');
          // Калькулятор об'єму піраміди
          volume = (1/3) * baseArea * height;
        } else {
          // Конструктор правильної призми
          objEl.setAttribute('geometry', `primitive: cylinder; radius: ${radius}; height: ${height}; segmentsRadial: ${segments};`);
          objEl.setAttribute('material', 'color: #2EC4B6');
          // Калькулятор об'єму призми
          volume = baseArea * height;
        }

        // Оновлення характеристик на UI панелі
        document.getElementById('calc-area').innerText = baseArea.toFixed(2);
        document.getElementById('calc-volume').innerText = volume.toFixed(2);
        
        // Коригування висоти позиціонування об'єкта
        objEl.setAttribute('position', `0 ${height / 2} -4`);
      }

      // ==========================================
      // ІНТЕРФЕЙС ГОЛОСОВИХ КОМАНД (ML / SPEECH API)
      // ==========================================
      let recognition;
      let isListening = false;

      if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'uk-UA'; // Мова розпізнавання - Українська
        recognition.continuous = true;
        recognition.interimResults = false;

        recognition.onresult = function(event) {
          const resultIndex = event.resultIndex;
          const command = event.results[resultIndex][0].transcript.toLowerCase().trim();
          console.log("Розпізнана команда:", command);
          
          document.getElementById('voice-status').innerText = `Почуто: "${command}"`;

          // Обробка команд машинного розпізнавання
          if (command.includes('піраміда')) {
            setShape('cone');
          } else if (command.includes('призма') || command.includes('циліндр')) {
            setShape('cylinder');
          } else if (command.includes('більше') || command.includes('радіус')) {
            radius = Math.min(2.0, radius + 0.3);
            document.getElementById('sld-radius').value = radius;
            document.getElementById('lbl-radius').innerText = radius.toFixed(1);
            updateGeometry();
          } else if (command.includes('вище') || command.includes('висота')) {
            height = Math.min(3.5, height + 0.5);
            document.getElementById('sld-height').value = height;
            document.getElementById('lbl-height').innerText = height.toFixed(1);
            updateGeometry();
          }
        };

        recognition.onerror = function(event) {
          console.error("Помилка розпізнавання:", event.error);
        };

        recognition.onend = function() {
          if(isListening) recognition.start(); // Автоперезапуск якщо кнопка активна
        };
      } else {
        document.getElementById('voice-status').innerText = "Браузер не підтримує розпізнавання мови";
        document.getElementById('mic-btn').style.display = 'none';
      }

      function toggleVoice() {
        const btn = document.getElementById('mic-btn');
        const status = document.getElementById('voice-status');

        if (!isListening) {
          recognition.start();
          isListening = true;
          btn.innerText = "Вимкнути голос";
          btn.style.background = "#28a745";
          status.innerText = "Слухаю команди...";
        } else {
          isListening = false;
          recognition.stop();
          btn.innerText = "Увімкнути голос";
          btn.style.background = "#dc3545";
          status.innerText = "Мікрофон вимкнено";
        }
      }
    </script>
  </body>
</html>
